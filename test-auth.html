<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Auth</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Inter,sans-serif;background:#0a0a1a;color:#fff;padding:30px;max-width:500px;margin:0 auto;}
h1{font-size:22px;margin-bottom:20px;color:#e94560;}
.form-group{margin-bottom:14px;}
label{display:block;font-size:13px;font-weight:600;margin-bottom:4px;}
input,select{width:100%;padding:10px;border-radius:6px;border:1px solid #444;background:#1a1a2e;color:#fff;font-size:14px;}
button{width:100%;padding:12px;background:#e94560;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;margin-top:10px;}
button:hover{background:#ff6b81;}
#log{background:#111;border:1px solid #333;border-radius:8px;padding:14px;margin-top:20px;font-size:12px;font-family:monospace;color:#a0e0a0;white-space:pre-wrap;max-height:400px;overflow-y:auto;}
.ok{color:#10b981;}.err{color:#e94560;}
</style>
</head>
<body>
<h1>🧪 Test Inscription</h1>

<div class="form-group"><label>Prénom</label><input type="text" id="t-prenom" value="Sam"></div>
<div class="form-group"><label>Nom</label><input type="text" id="t-nom" value="Bobby"></div>
<div class="form-group"><label>Email</label><input type="email" id="t-email" value="sam2@lesformateurs.online"></div>
<div class="form-group"><label>Téléphone</label><input type="tel" id="t-phone" value="0744880060"></div>
<div class="form-group"><label>Mot de passe</label><input type="text" id="t-pass" value="testtest123"></div>

<button onclick="testSignup()">🚀 Tester l'inscription</button>
<button onclick="testLogin()" style="background:#0f3460;">🔑 Tester la connexion</button>
<button onclick="checkUser()" style="background:#333;">👤 Vérifier session</button>

<div id="log">En attente...\n</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
var log = document.getElementById('log');
function addLog(msg, cls) { log.innerHTML += '<span class="'+(cls||'')+'">' + msg + '</span>\n'; log.scrollTop=log.scrollHeight; }

try {
  var sb = window.supabase.createClient(
    'https://bxijjjbxsevnudienvbv.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ4aWpqamJ4c2V2bnVkaWVudmJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MjU0MjcsImV4cCI6MjA4OTUwMTQyN30.9YNffsFuGv7at2nUviuCUMA469z0FuskYHJtkOAaTn8'
  );
  addLog('✅ Supabase client initialisé', 'ok');
} catch(e) {
  addLog('❌ Supabase init error: ' + e.message, 'err');
}

async function testSignup() {
  addLog('\n--- SIGNUP ---');
  var prenom = document.getElementById('t-prenom').value;
  var nom = document.getElementById('t-nom').value;
  var email = document.getElementById('t-email').value;
  var pass = document.getElementById('t-pass').value;
  var phone = document.getElementById('t-phone').value;

  addLog('Email: ' + email);
  addLog('Pass length: ' + pass.length);

  try {
    var { data, error } = await sb.auth.signUp({
      email: email,
      password: pass,
      options: { data: { first_name: prenom, last_name: nom, full_name: prenom+' '+nom, phone: phone, profile_type: 'formateur' } }
    });

    if (error) {
      addLog('❌ Signup error: ' + error.message, 'err');
      return;
    }

    addLog('✅ Signup OK!', 'ok');
    addLog('User ID: ' + (data.user ? data.user.id : 'null'));
    addLog('Session: ' + (data.session ? 'YES' : 'NO'));

    if (data.session) {
      addLog('✅ Session active — redirection OK', 'ok');
    } else {
      addLog('⚠️ Pas de session — email confirmation peut-être encore active?', 'err');
    }

  } catch(e) {
    addLog('❌ Exception: ' + e.message, 'err');
  }
}

async function testLogin() {
  addLog('\n--- LOGIN ---');
  var email = document.getElementById('t-email').value;
  var pass = document.getElementById('t-pass').value;

  try {
    var { data, error } = await sb.auth.signInWithPassword({ email: email, password: pass });
    if (error) {
      addLog('❌ Login error: ' + error.message, 'err');
      return;
    }
    addLog('✅ Login OK!', 'ok');
    addLog('User: ' + data.user.email);
    addLog('Session: ' + (data.session ? 'YES' : 'NO'));
  } catch(e) {
    addLog('❌ Exception: ' + e.message, 'err');
  }
}

async function checkUser() {
  addLog('\n--- CHECK USER ---');
  var { data } = await sb.auth.getUser();
  if (data.user) {
    addLog('✅ Connecté: ' + data.user.email, 'ok');
    addLog('ID: ' + data.user.id);
    
    // Check profile
    var { data: profile, error } = await sb.from('profiles').select('*').eq('id', data.user.id).single();
    if (profile) {
      addLog('✅ Profil: ' + profile.first_name + ' ' + profile.last_name, 'ok');
      addLog('Referral: ' + profile.referral_code);
    } else {
      addLog('❌ Profil non trouvé: ' + (error ? error.message : ''), 'err');
    }
  } else {
    addLog('❌ Non connecté', 'err');
  }
}
</script>
</body>
</html>
