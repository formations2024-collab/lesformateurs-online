<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon panier — lesformateurs.online</title>
<link rel="canonical" href="https://lesformateurs.online/panier">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --o:#D85A30;--o-bg:#FFF8F5;--o-lt:#FAECE7;
  --g:#1D9E75;--g-bg:#E9F7F1;--g-lt:#085041;
  --v:#534AB7;--v-bg:#EEEDFE;--v-dk:#3C3489;
  --b:#378ADD;--b-bg:#E6F1FB;--b-dk:#0C447C;
  --dk:#1a1a1a;--gy:#888;--lgy:#aaa;--bd:#f0f0f0;--bg:#FEFEFE;
}
html,body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--dk);overflow-x:hidden}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer}
::selection{background:var(--o);color:#fff}

@keyframes fadeUp{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes rhSpin{to{transform:rotate(360deg)}}

.lfo-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:8px;font-weight:600;font-size:14px;border:none;transition:all .15s}
.lfo-btn:hover{filter:brightness(.95)}
.lfo-btn:active{transform:scale(.98)}
.lfo-btn:disabled{cursor:not-allowed;opacity:.6}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600;letter-spacing:.02em}

header.lfo-head{position:sticky;top:0;z-index:100;background:rgba(254,254,254,.92);backdrop-filter:blur(12px);border-bottom:.5px solid var(--bd)}
.lfo-head-inner{max-width:1100px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:24px}
.lfo-head-left{display:flex;align-items:center;gap:32px}
.lfo-logo{font-weight:700;font-size:16px;letter-spacing:-.02em;color:var(--dk)}
.lfo-logo span{color:var(--o)}
.lfo-nav{display:flex;gap:20px}
.lfo-nav a{font-size:13px;color:var(--gy);font-weight:400;transition:color .15s}
.lfo-nav a:hover{color:var(--dk)}
.lfo-nav a.g{color:var(--g);font-weight:600}
.lfo-nav a.o{color:var(--o);font-weight:600}
.lfo-head-cta{background:var(--dk);color:#fff;padding:8px 16px;font-size:13px}
.lfo-promo{background:linear-gradient(90deg,#1a1a1a,#2a2a2a);color:#fff;padding:7px 24px;font-size:12px;text-align:center;display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap}
.lfo-promo strong{font-weight:700}
.lfo-promo .pr-tag{background:var(--o);padding:1px 6px;border-radius:3px;font-size:10px;font-weight:700}
@media(max-width:760px){.lfo-nav{display:none}.lfo-head-inner{padding:12px 16px}}

.page{max-width:960px;margin:0 auto;padding:40px 20px 80px}
.bc{font-size:13px;color:var(--lgy);margin-bottom:28px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.bc a{color:var(--gy)}
.bc .sep{color:#ccc}
.bc .cur{color:var(--o);font-weight:500}
.hd{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:12px}
.hd h1{font-size:28px;font-weight:700;letter-spacing:-.03em;margin:0}
.hd-sub{color:var(--gy);font-size:14px;margin-top:4px}
.btn-add{background:#fafafa;color:var(--dk);border:1px solid #eee}

.empty{text-align:center;padding:80px 20px}
.empty-ic{margin-bottom:16px;opacity:.3;color:var(--gy);display:flex;justify-content:center}
.empty h2{font-size:16px;font-weight:600;margin-bottom:4px}
.empty p{color:var(--gy);font-size:14px;margin-bottom:20px}

.grid{display:grid;grid-template-columns:1fr 380px;gap:32px;align-items:flex-start}
@media(max-width:880px){.grid{grid-template-columns:1fr}}

.items{display:flex;flex-direction:column;gap:16px}
.item{background:#fff;border:.5px solid var(--bd);border-radius:12px;overflow:hidden;animation:fadeUp .35s ease both}
.item-main{padding:20px 24px;display:flex;gap:16px}
.item-ic{width:56px;height:56px;border-radius:12px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.item-ic.hab{background:var(--v-bg)}
.item-ic.hab .t{font-size:10px;font-weight:700;color:#7F77DD;letter-spacing:.04em}
.item-ic.hab .c{font-size:14px;font-weight:700;color:var(--v-dk)}
.item-ic.pack{background:linear-gradient(135deg,var(--o),#e8784e);color:#fff}
.item-ic.svc{background:#f5f5f5;color:#888}
.item-body{flex:1;min-width:0}
.item-tags{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap}
.item-body h3{font-size:16px;font-weight:600;margin:0 0 2px;letter-spacing:-.01em}
.item-body p{font-size:13px;color:var(--gy);margin:0}
.item-fins{display:flex;gap:4px;margin-top:8px}
.item-pack-list{margin-top:10px;display:flex;flex-direction:column;gap:4px}
.item-pack-list div{display:flex;align-items:center;gap:6px;font-size:13px;color:#666}
.item-qty{display:flex;align-items:center;gap:8px;margin-top:10px}
.item-qty span{font-size:13px;color:var(--gy)}
.opt-block{margin-top:14px;padding:12px 14px;background:#fafafa;border:1px solid #f0f0f0;border-radius:10px}
.opt-title{font-size:11px;font-weight:700;color:var(--gy);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.opt-sum{color:var(--o);font-size:12px;font-weight:700;text-transform:none;letter-spacing:0}
.opt-list{display:flex;flex-direction:column;gap:6px}
.opt-row{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;background:#fff;border:1px solid #eee;border-radius:8px;cursor:pointer;transition:all .15s;font-family:inherit;text-align:left}
.opt-row:hover{border-color:var(--o);background:var(--o-bg)}
.opt-row.on{border-color:var(--o);background:var(--o-bg);box-shadow:0 0 0 1px var(--o) inset}
.opt-cb{width:20px;height:20px;border-radius:6px;border:2px solid #ddd;background:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.opt-row.on .opt-cb{background:var(--o);border-color:var(--o)}
.opt-main{flex:1;min-width:0;display:flex;flex-direction:column}
.opt-main b{font-size:13px;font-weight:600;color:var(--dk);line-height:1.3}
.opt-main small{font-size:11px;color:var(--gy);margin-top:2px;line-height:1.3}
.opt-price{font-size:13px;font-weight:700;color:var(--o);white-space:nowrap;flex-shrink:0}
.side-line-opt{padding-left:8px}
.side-line-opt .n{color:#888;font-size:12px}
.side-line-opt .v{font-size:12px;color:var(--o)}
.qty-box{display:inline-flex;border:1px solid #eee;border-radius:6px;overflow:hidden}
.qty-box button{width:32px;height:32px;border:none;background:#fafafa;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:500;color:#666}
.qty-box button:hover{background:#f5f5f5}
.qty-box .qv{width:36px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600}
.item-price{text-align:right;flex-shrink:0}
.item-price .old{font-size:13px;color:var(--lgy);text-decoration:line-through;margin-bottom:2px}
.item-price .now{font-size:20px;font-weight:700;letter-spacing:-.02em}
.item-price .save{font-size:12px;color:var(--g);font-weight:600;margin-top:2px}
.item-foot{border-top:.5px solid var(--bd);padding:10px 24px;display:flex;justify-content:space-between;align-items:center;background:#fcfcfc}
.item-foot-l{font-size:12px;color:var(--lgy)}
.btn-rm{border:none;background:none;color:#ccc;font-size:12px;display:inline-flex;align-items:center;gap:4px;transition:color .15s}
.btn-rm:hover{color:#E24B4A}
@media(max-width:600px){.item-main{flex-wrap:wrap}.item-price{width:100%;text-align:left;border-top:.5px dashed var(--bd);padding-top:10px;margin-top:4px}}

.edof{border:1.5px dashed var(--g);border-radius:12px;padding:16px 24px;background:#f8fdf9;display:flex;align-items:center;gap:16px;animation:fadeUp .35s ease .2s both}
.edof-ic{width:44px;height:44px;border-radius:10px;background:var(--g-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--g)}
.edof-txt{flex:1}
.edof-txt b{font-weight:600;font-size:14px;color:var(--g-lt);display:block}
.edof-txt span{font-size:12px;color:var(--gy);margin-top:2px;display:block}
.edof-tag{display:flex;align-items:center;gap:8px;flex-shrink:0}
.edof-tag .old{text-decoration:line-through;color:var(--lgy);font-size:14px}
.edof-tag .gift{background:var(--g);color:#fff;padding:4px 10px;border-radius:5px;font-size:12px;font-weight:700}
.edof-actions{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.edof-decline{background:none;border:none;color:var(--gy);font-size:11px;font-family:inherit;cursor:pointer;text-decoration:underline;padding:0;transition:color .15s}
.edof-decline:hover{color:#E24B4A}
.edof-declined{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 18px;background:#fafafa;border:1px dashed #ddd;border-radius:10px;font-size:13px;color:var(--gy);animation:fadeUp .35s ease both;flex-wrap:wrap}
.edof-declined span{flex:1;min-width:0}
.edof-restore{background:transparent;color:var(--g);border:1px solid var(--g);padding:6px 12px;border-radius:7px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;white-space:nowrap;transition:all .15s}
.edof-restore:hover{background:var(--g);color:#fff}

.side{position:sticky;top:120px}
.side-card{background:#fff;border:.5px solid var(--bd);border-radius:12px;overflow:hidden}
.side-sec{padding:20px 24px;border-bottom:.5px solid var(--bd)}
.side-sec:last-child{border-bottom:0}
.side-sec h3{font-size:16px;font-weight:700;margin:0 0 16px;letter-spacing:-.01em}
.side-lines{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.side-line{display:flex;justify-content:space-between;font-size:14px}
.side-line .n{color:#666;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.side-line .v{font-weight:600}
.side-line.g .n,.side-line.g .v{color:var(--g)}
.side-line.o .n,.side-line.o .v{color:var(--o)}
.promo-row{display:flex;gap:8px;margin-bottom:16px}
.promo-row input{flex:1;padding:10px 12px;border:.5px solid #eee;border-radius:8px;font-size:13px;font-family:inherit}
.promo-row input:focus{outline:none;border-color:var(--o)}
.promo-row button{background:#f5f5f5;color:#666;padding:10px 14px;font-size:13px}
.promo-row button.applied{background:var(--g-bg);color:var(--g-lt)}
.side-div{height:1px;background:var(--bd);margin:0 -24px 16px}
.side-total{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.side-total .lbl{font-size:14px;font-weight:500}
.side-total .amt{font-size:26px;font-weight:700;letter-spacing:-.03em}
.side-save{font-size:12px;color:var(--g);text-align:right}

.pay-modes{display:flex;flex-direction:column;gap:8px}
.pay-mode{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;border:1px solid #eee;background:#fff;cursor:pointer;transition:all .15s}
.pay-mode.sel{border:1.5px solid var(--o);background:var(--o-bg)}
.pay-mode .dot{width:16px;height:16px;border-radius:50%;border:2px solid #ccc;flex-shrink:0;transition:all .15s}
.pay-mode.sel .dot{border:5px solid var(--o)}
.pay-mode b{font-size:13px;font-weight:600;display:block;color:var(--dk)}
.pay-mode.sel b{color:var(--o)}
.pay-mode small{font-size:12px;color:var(--gy)}

.btn-pay{width:100%;justify-content:center;padding:14px;font-size:15px;background:var(--o);color:#fff;font-weight:700;border-radius:8px;border:none;display:inline-flex;align-items:center;gap:6px}
.btn-pay:hover{filter:brightness(.95)}
.pay-info{text-align:center;margin-top:10px;font-size:11px;color:var(--lgy);line-height:1.5}
.trust{display:flex;justify-content:center;gap:16px;margin-top:16px}
.trust div{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--lgy)}

.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s}
.modal{background:#fff;border-radius:16px;width:100%;max-width:560px;max-height:80vh;display:flex;flex-direction:column;animation:fadeUp .25s}
.modal-head{padding:20px 24px;border-bottom:.5px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:17px;font-weight:700;margin:0}
.modal-close{border:none;background:none;color:#999;padding:4px;display:flex}
.modal-search{padding:12px 24px 0}
.modal-search input{width:100%;padding:10px 14px;border:.5px solid #eee;border-radius:8px;font-size:14px;font-family:inherit;background:#fafafa}
.modal-search input:focus{outline:none;background:#fff;border-color:var(--o)}
.modal-body{flex:1;overflow-y:auto;padding:12px 24px 20px}
.cat-title{font-size:11px;font-weight:600;color:var(--lgy);text-transform:uppercase;letter-spacing:.06em;margin:16px 0 8px}
.cat-title:first-child{margin-top:0}
.svc-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:.5px solid #f5f5f5}
.svc-row:last-child{border-bottom:0}
.svc-row .n{font-size:14px;font-weight:500}
.svc-row .p{font-size:12px;color:var(--gy);margin-top:2px}
.svc-add{background:var(--o);color:#fff;padding:6px 14px;font-size:12px;border-radius:6px;border:none}
.svc-in{font-size:12px;color:var(--g);font-weight:600}

.conf{max-width:560px;margin:80px auto;text-align:center;padding:0 20px}
.conf-ic{width:80px;height:80px;border-radius:50%;background:var(--g-bg);display:inline-flex;align-items:center;justify-content:center;margin-bottom:24px;color:var(--g)}
.conf h1{font-size:28px;font-weight:700;letter-spacing:-.03em;margin-bottom:8px}
.conf p{color:var(--gy);font-size:15px;line-height:1.6;margin-bottom:12px}
.conf .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:32px}

footer.lfo-foot{border-top:.5px solid var(--bd);padding:24px;text-align:center;font-size:12px;color:var(--lgy)}
</style>
</head>
<body>

  <div class="lfo-head-inner">
    <div class="lfo-head-left">
      <a href="/" class="lfo-logo">les<span>formateurs</span>.online</a>
      <nav class="lfo-nav">

</body>
</html>
