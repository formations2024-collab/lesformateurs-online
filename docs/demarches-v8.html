<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LFO — Démarches v8</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',-apple-system,sans-serif;min-height:100vh;transition:background .2s}
body.view-user{background:#F7F5F3;color:#1a1a1a}
body.view-expert{background:#F4F3FA;color:#1a1a1a}
body.view-admin{background:#EFF1F3;color:#1a1a1a}

.hdr{background:#fff;border-bottom:.5px solid #f0f0f0;padding:14px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.hdr-l{display:flex;align-items:center;gap:14px}
.logo{font-weight:700;font-size:16px;letter-spacing:-.3px}
body.view-user .logo span{color:#D85A30}
body.view-expert .logo span{color:#534AB7}
body.view-admin .logo span{color:#2B5F8A}
.ctx{font-size:11px;color:#888}
.ctx b{color:#1a1a1a;font-weight:500}
.switcher{display:flex;gap:4px;background:#f5f5f5;padding:3px;border-radius:10px}
.sw-btn{padding:7px 14px;font-family:inherit;font-size:11px;font-weight:500;border:none;background:transparent;cursor:pointer;border-radius:7px;color:#888;transition:all .15s;display:flex;align-items:center;gap:6px}
.sw-btn:hover{color:#1a1a1a}
.sw-btn.a{background:#2B5F8A;color:#fff}
.sw-btn.e{background:#534AB7;color:#fff}
.sw-btn.u{background:#D85A30;color:#fff}
.sw-dot{width:6px;height:6px;border-radius:50%;background:currentColor}

.pw{max-width:1100px;margin:0 auto;padding:24px}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:12px;flex-wrap:wrap}
.pt{font-size:22px;font-weight:700;letter-spacing:-.3px}
.psub{font-size:12px;color:#888;margin-bottom:20px}
.add-btn{padding:9px 16px;color:#fff;border:none;border-radius:9px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:opacity .15s}
.add-btn:hover{opacity:.9}
body.view-admin .add-btn{background:#2B5F8A}
body.view-user .add-btn{background:#D85A30}
body.view-expert .add-btn{background:#534AB7}

/* Bouton retour */
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;font-family:inherit;font-size:12px;color:#666;cursor:pointer;padding:6px 0;margin-bottom:6px}
.back-btn:hover{color:#1a1a1a}

/* Filtres admin */
.admin-filters{background:#fff;border:.5px solid #f0f0f0;border-radius:12px;padding:14px 16px;margin-bottom:16px}
.admin-filters-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.search-wrap{flex:1;min-width:240px;position:relative}
.search-input{width:100%;padding:9px 12px 9px 32px;border:.5px solid #e0e0e0;border-radius:8px;font-family:inherit;font-size:12px;background:#FAFAFA}
.search-input:focus{outline:none;border-color:#2B5F8A;background:#fff}
.search-ic{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#888}
.filter-select{padding:9px 12px;border:.5px solid #e0e0e0;border-radius:8px;font-family:inherit;font-size:12px;background:#FAFAFA;cursor:pointer;min-width:130px}
.filter-select:focus{outline:none;border-color:#2B5F8A;background:#fff}
.filter-clear{padding:7px 12px;background:#fff;border:.5px solid #e0e0e0;border-radius:8px;font-family:inherit;font-size:11px;color:#666;cursor:pointer}
.filter-clear:hover{background:#FAFAFA;color:#1a1a1a}
.filter-active-count{font-size:10px;color:#888;margin-top:8px}
.filter-active-count b{color:#2B5F8A;font-weight:600}

.cl{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:#aaa;font-weight:600;margin:22px 0 8px;padding-left:4px}

.cc{background:#fff;border-radius:11px;border:.5px solid #f0f0f0;margin-bottom:4px;cursor:pointer;transition:all .12s;position:relative;scroll-margin-top:80px}
.cc:hover{border-color:#ddd}
.ci{display:flex;align-items:center;padding:11px 16px;gap:10px}
.cb2{width:3px;height:28px;border-radius:2px;flex-shrink:0}
.ct{font-size:9px;letter-spacing:.4px;text-transform:uppercase;padding:2px 6px;border-radius:3px;font-weight:600;flex-shrink:0}
.cn{flex:1;min-width:0}
.cnn{font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px}
.cm{font-size:10px;color:#999;margin-top:1px}

.ts{font-size:8px;padding:1px 5px;border-radius:3px;font-weight:500;text-transform:uppercase;letter-spacing:.3px}
.tw{background:#FFF9E6;color:#854F0B}
.tg{background:#E9F7F1;color:#0F6E56}
.tp{background:#EEEDFE;color:#3C3489}
.tb{background:#E6F1FB;color:#0C447C}

.prg{display:flex;flex-direction:column;gap:2px;min-width:90px}
.prg-bar{height:4px;background:#f0f0f0;border-radius:2px;overflow:hidden}
.prg-fill{height:100%;border-radius:2px;transition:width .3s}
body.view-user .prg-fill{background:#D85A30}
body.view-expert .prg-fill{background:#534AB7}
body.view-admin .prg-fill{background:#2B5F8A}
.prg-t{font-size:9px;color:#888;display:flex;justify-content:space-between}
body.view-user .prg-t b{color:#D85A30;font-weight:600}
body.view-expert .prg-t b{color:#534AB7;font-weight:600}
body.view-admin .prg-t b{color:#2B5F8A;font-weight:600}

.sb{display:flex;align-items:center;gap:6px;flex-shrink:0;padding:4px 9px;border-radius:7px}
.sb .sn{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;color:#fff}
.sb .sl{font-size:10px;font-weight:500;white-space:nowrap}

/* Bouton détails (sur card fermée) */
.details-btn{padding:5px 10px;background:#FAFAFA;border:.5px solid #e0e0e0;border-radius:6px;font-family:inherit;font-size:10px;font-weight:500;color:#666;cursor:pointer;flex-shrink:0;transition:all .12s}
.details-btn:hover{background:#fff;border-color:#aaa;color:#1a1a1a}

.ca{width:20px;height:20px;border-radius:50%;background:#f5f5f5;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ca svg{transition:transform .2s}
.cc.op .ca svg{transform:rotate(180deg)}

.ce{display:none;background:#fff;border-radius:0 0 11px 11px;border:.5px solid #f0f0f0;border-top:none;margin-top:-5px;margin-bottom:4px}
.cc.op+.ce{display:block}
.cc.op{border-radius:11px 11px 0 0;margin-bottom:0;border-bottom-color:transparent}

.cs{display:flex;border-bottom:.5px solid #f0f0f0;overflow-x:auto}
.cs>div{flex:1;text-align:center;padding:10px 3px;cursor:pointer;position:relative;min-width:60px;transition:background .12s}
.cs>div:hover{background:#FAFAFA}
.cs>div:not(:last-child)::after{content:'';position:absolute;right:0;top:22%;height:56%;width:.5px;background:#f0f0f0}
.cs .d{border-bottom:2px solid #1D9E75}
.cs .p{border-bottom:2px solid transparent}
body.view-user .cs .c{border-bottom:2px solid #D85A30;background:#FFF9F5}
body.view-expert .cs .c{border-bottom:2px solid #534AB7;background:#F1F0FD}
body.view-admin .cs .c{border-bottom:2px solid #2B5F8A;background:#EDF3F9}

.sd{width:16px;height:16px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;margin-bottom:1px}
.cs .d .sd{background:#1D9E75;color:#fff}
.cs .p .sd{background:#f0f0f0;color:#aaa}
body.view-user .cs .c .sd{background:#D85A30;color:#fff}
body.view-expert .cs .c .sd{background:#534AB7;color:#fff}
body.view-admin .cs .c .sd{background:#2B5F8A;color:#fff}
.sn3{font-size:9px;font-weight:500;display:block}
.cs .d .sn3{color:#0F6E56}
.cs .p .sn3{color:#aaa}
body.view-user .cs .c .sn3{color:#D85A30;font-weight:600}
body.view-expert .cs .c .sn3{color:#534AB7;font-weight:600}
body.view-admin .cs .c .sn3{color:#2B5F8A;font-weight:600}

.eb{padding:16px 20px}
.eh{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.ecb{font-size:8px;padding:2px 7px;border-radius:16px;text-transform:uppercase;letter-spacing:.4px;font-weight:600}
body.view-user .ecb{background:#FFF2EC;color:#993C1D}
body.view-expert .ecb{background:#F1F0FD;color:#3C3489}
body.view-admin .ecb{background:#EDF3F9;color:#234E70}
.ect{font-size:16px;font-weight:700}
body.view-user .ect{color:#D85A30}
body.view-expert .ect{color:#534AB7}
body.view-admin .ect{color:#2B5F8A}
.ect.dt{color:#1D9E75 !important}

.cfg{background:#FAFAFA;border-radius:10px;padding:16px 18px;margin-bottom:14px}
.cfg-t{font-size:13px;font-weight:600;margin-bottom:6px}
.cfg-h{font-size:11px;color:#888;margin-bottom:12px;line-height:1.5}

.pay-info{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:#E9F7F1;border:.5px solid #9FE1CB;border-radius:8px;font-size:11px;color:#0F6E56;font-weight:500;margin-right:6px}
.pay-info.pending{background:#FFF9E6;border-color:#f0d989;color:#854F0B}
.pay-info.unpaid{background:#FCEBEB;border-color:#FBD5D5;color:#C53030}

.crosssell-block{padding:14px 16px;background:#FCEBEB;border:.5px solid #FBD5D5;border-radius:10px;margin-bottom:12px}
.crosssell-block p{font-size:12px;color:#791F1F;margin-bottom:8px;line-height:1.5}
.crosssell-btn{padding:8px 14px;background:#E24B4A;color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:11px;font-weight:500;cursor:pointer}

.pricing-box{background:#fff;border:.5px solid #e8e8e8;border-radius:10px;padding:12px 14px;margin-bottom:10px}
.pricing-row{display:flex;justify-content:space-between;font-size:11px;padding:3px 0;color:#666}
.pricing-total{display:flex;justify-content:space-between;padding:8px 0 0;margin-top:6px;border-top:.5px solid #eee;font-size:13px;font-weight:600;color:#1a1a1a}
.pricing-installments{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.install-pill{padding:4px 10px;border:.5px solid #e0e0e0;border-radius:6px;font-size:10px;cursor:pointer;background:#fff}
.install-pill.sel{border-color:#D85A30;background:#FFF9F5;color:#D85A30;font-weight:600}
body.view-expert .install-pill.sel{border-color:#534AB7;background:#F1F0FD;color:#534AB7}
body.view-admin .install-pill.sel{border-color:#2B5F8A;background:#EDF3F9;color:#2B5F8A}

.opt-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.opt-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:#fff;border:.5px solid #e8e8e8;border-radius:8px;cursor:pointer;transition:all .12s}
.opt-item:hover{border-color:#ccc}
.opt-item.sel{border-color:#D85A30;background:#FFF9F5}
body.view-expert .opt-item.sel{border-color:#534AB7;background:#F1F0FD}
body.view-admin .opt-item.sel{border-color:#2B5F8A;background:#EDF3F9}
.opt-chk{width:16px;height:16px;border:2px solid #ddd;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.opt-item.sel .opt-chk{background:#D85A30;border-color:#D85A30}
body.view-expert .opt-item.sel .opt-chk{background:#534AB7;border-color:#534AB7}
body.view-admin .opt-item.sel .opt-chk{background:#2B5F8A;border-color:#2B5F8A}
.opt-info{flex:1}
.opt-info b{font-size:12px;font-weight:500}
.opt-info span{font-size:10px;color:#888;display:block}
.opt-price{font-size:11px;font-weight:600;color:#1a1a1a}

.ep{background:#FAFAFA;border-radius:8px;padding:10px;margin-top:14px}
.ept{font-size:8px;text-transform:uppercase;letter-spacing:.8px;color:#aaa;margin-bottom:6px}
.epr{display:flex;justify-content:space-between;padding:4px 0;border-bottom:.5px solid #eee;font-size:10px}
.epr:last-child{border-bottom:none}
.epk{color:#888}
.epv{font-weight:500}

.ea{display:flex;gap:4px;padding:10px 20px;border-top:.5px solid #f0f0f0;background:#FAFAFA;border-radius:0 0 11px 11px;flex-wrap:wrap}
.eb4{padding:6px 11px;border-radius:7px;font-family:inherit;font-size:10px;font-weight:500;cursor:pointer;border:none;transition:all .12s;display:flex;align-items:center;gap:5px}
.pr2{color:#fff}
body.view-user .pr2{background:#D85A30}
body.view-expert .pr2{background:#534AB7}
body.view-admin .pr2{background:#2B5F8A}
.sc3{background:#fff;border:.5px solid #e0e0e0;color:#1a1a1a}
.dan{background:#fff;border:.5px solid #FBD5D5;color:#C53030}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:10px;font-size:12px;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;z-index:300}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center;z-index:500;padding:20px}
.modal-card{background:#fff;border-radius:14px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;padding:24px}
.modal-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.modal-head h2{font-size:18px;font-weight:700;margin-bottom:4px}
.modal-head p{font-size:12px;color:#888}
.modal-close{background:#f5f5f5;border:none;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;color:#666}
.modal-close:hover{background:#e0e0e0}
.rdv-grid{display:grid;gap:10px}
.rdv-card{display:flex;align-items:center;gap:12px;padding:14px;border:.5px solid #e8e8e8;border-radius:11px;cursor:pointer;transition:all .12s}
.rdv-card:hover{border-color:#1a1a1a;transform:translateY(-1px);box-shadow:0 4px 8px rgba(0,0,0,.04)}
.rdv-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px;flex-shrink:0}
.rdv-info{flex:1;min-width:0}
.rdv-info b{font-size:13px;font-weight:600;display:block}
.rdv-info span{font-size:10px;color:#888;display:block;margin-bottom:3px}
.rdv-spe{font-size:10px;color:#666;line-height:1.3}
.rdv-btn{padding:8px 14px;color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;flex-shrink:0;white-space:nowrap}
.toast.show{opacity:1}

.empty{text-align:center;padding:60px 20px;color:#888;font-size:12px}
.filter-bar{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.fb-btn{padding:6px 12px;background:#fff;border:.5px solid #f0f0f0;border-radius:8px;font-family:inherit;font-size:10px;font-weight:500;cursor:pointer;white-space:nowrap}
.fb-btn.act{color:#fff}
body.view-user .fb-btn.act{background:#D85A30;border-color:#D85A30}
body.view-expert .fb-btn.act{background:#534AB7;border-color:#534AB7}
body.view-admin .fb-btn.act{background:#2B5F8A;border-color:#2B5F8A}

/* Catalogue page (mode catalogue) */
.catalogue-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;margin-top:16px}
.cat-card{background:#fff;border:.5px solid #f0f0f0;border-radius:11px;padding:16px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:8px;position:relative;overflow:hidden}
.cat-card:hover{border-color:#aaa;transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.06)}
.cat-card-bar{position:absolute;left:0;top:0;bottom:0;width:3px}
.cat-card-head{display:flex;align-items:center;gap:8px;margin-left:6px}
.cat-tag{font-size:9px;letter-spacing:.4px;text-transform:uppercase;padding:2px 6px;border-radius:3px;font-weight:600}
.cat-card-title{font-size:14px;font-weight:600;color:#1a1a1a;margin-left:6px;letter-spacing:-.2px}
.cat-card-desc{font-size:11px;color:#888;line-height:1.5;margin-left:6px;min-height:32px}
.cat-card-meta{display:flex;justify-content:space-between;align-items:center;margin-top:8px;margin-left:6px;padding-top:10px;border-top:.5px solid #f5f5f5}
.cat-price{font-size:14px;font-weight:700;color:#D85A30}
.cat-pay{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.3px}
.cat-steps{font-size:10px;color:#666}
.cat-start-btn{padding:6px 12px;border:none;border-radius:7px;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;color:#fff;background:#D85A30;display:flex;align-items:center;gap:5px}
.cat-start-btn:hover{opacity:.9}

@media(max-width:700px){
  .hdr{flex-direction:column;gap:10px;padding:12px 16px}
  .cs{min-width:max-content}
  .catalogue-grid{grid-template-columns:1fr}
}
</style>
</head>
<body class="view-user">

<div class="hdr">
  <div class="hdr-l">
    <div class="logo">LFO<span>.</span></div>
    <div class="ctx">Connecté : <b id="ctx-user">Pamela Maillot</b></div>
  </div>
  <div class="switcher">
    <button class="sw-btn" data-view="admin" onclick="setView('admin')"><span class="sw-dot"></span>Admin</button>
    <button class="sw-btn" data-view="expert" onclick="setView('expert')"><span class="sw-dot"></span>Expert</button>
    <button class="sw-btn u" data-view="user" onclick="setView('user')"><span class="sw-dot"></span>Utilisateur</button>
  </div>
</div>

<div class="pw">
<div class="toast" id="toast"></div>

<div id="catalogue-mode" style="display:none">
  <button class="back-btn" onclick="exitCatalogue()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Retour à mes démarches
  </button>
  <div class="ph">
    <div>
      <div class="pt">Démarrer une nouvelle démarche</div>
      <div class="psub">Choisissez parmi 22 démarches disponibles</div>
    </div>
  </div>
  <div class="filter-bar" id="cat-filter-bar"></div>
  <div id="catalogue-grid"></div>
</div>

<div id="list-mode">
  <div class="ph">
    <div>
      <div class="pt" id="page-title">Mes démarches</div>
      <div class="psub" id="page-sub">22 démarches disponibles — spécifications finalisées</div>
    </div>
    <button class="add-btn" id="add-btn" onclick="onAddBtn()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span id="add-btn-label">+ Démarrer une démarche</span>
    </button>
  </div>

  <div id="admin-filters" style="display:none">
    <div class="admin-filters">
      <div class="admin-filters-row">
        <div class="search-wrap">
          <span class="search-ic">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </span>
          <input type="text" class="search-input" id="search-input" placeholder="Rechercher un client (nom, email, SIREN...)" oninput="onSearch()">
        </div>
        <select class="filter-select" id="filter-expert" onchange="render()">
          <option value="">Tous les experts</option>
        </select>
        <select class="filter-select" id="filter-client" onchange="render()">
          <option value="">Tous les clients</option>
        </select>
        <select class="filter-select" id="filter-type" onchange="render()">
          <option value="">Tous les types</option>
        </select>
        <button class="filter-clear" onclick="clearFilters()">Réinitialiser</button>
      </div>
      <div class="filter-active-count" id="filter-count"></div>
    </div>
  </div>

  <div class="filter-bar" id="filter-bar"></div>
  <div id="cards"></div>
</div>

</div>

<script>
var CHK='<svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>';

var CATEGORIES = {
  'Démarrer mon activité': ['nda','creation_of','creation_formation','edof','qualiopi','opco','france_travail'],
  'Niches spécialisées': ['controle','uai','centre_examen','agrement_prefectoral','formation_elus','habilitation','centre_certifie'],
  'Packs': ['pack_presence','pack_digital','pack_premium','pack_enterprise'],
  'Développer mon organisme': ['site','app','lms','agent_ia']
};

var STEPS = {
  nda:['Configuration','Dépôt dossier','Réception courrier','Terminée'],
  creation_of:['Configuration','Kbis','NDA','Qualiopi','Options annexes','Terminée'],
  creation_formation:['Configuration','Création formation','Vérif formateur','Validation client','Terminée'],
  edof:['Configuration','Formulaire','Dépôt','Webinaire','Terminée'],

function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},1800)}
function tog(id){
  var c=document.getElementById('c-'+id);
  if(!c)return;
  var willOpen = !c.classList.contains('op');
  // Mode accordéon : ferme toutes les autres
  document.querySelectorAll('.cc.op').forEach(function(other){
    if(other.id !== 'c-'+id) other.classList.remove('op');
  });
  c.classList.toggle('op');
  if(willOpen){
    setTimeout(function(){c.scrollIntoView({behavior:'smooth',block:'nearest'})},120);
  }
}
function getCategoryOf(type){for(var c in CATEGORIES){if(CATEGORIES[c].indexOf(type)>=0)return c}return'Autre'}

function statusBadge(d){
  if(d.status==='termine')return '<span class="ts tg">Terminée</span>';
  if(d.status==='en_attente_paiement')return '<span class="ts tw">À payer</span>';
  if(d.status==='nouveau')return '<span class="ts tp">Nouveau</span>';
  return '<span class="ts tb">En cours</span>';
}

function paymentBadge(d){
  if(d.paid && d.installments_paid >= d.installments_total){
    return '<span class="pay-info">✓ Payé '+d.installments_total+'/'+d.installments_total+'</span>';
  }
  if(d.payment_mode && d.installments_paid > 0){
    return '<span class="pay-info pending">⏳ '+d.installments_paid+'/'+d.installments_total+' (blocage étape '+(d.installments_paid+1)+' si non payé)</span>';
  }
  if(!d.paid){
    return '<span class="pay-info unpaid">✗ Non payé</span>';
  }
  return '';
}

    if(ADMIN_FILTER_EXPERT){

    var ts=document.getElementById('filter-type');
    if(es)es.addEventListener('change', function(){ADMIN_FILTER_EXPERT=this.value;render()});
    if(cs)cs.addEventListener('change', function(){ADMIN_FILTER_CLIENT=this.value;render()});
    if(ts)ts.addEventListener('change', function(){ADMIN_FILTER_TYPE=this.value;render()});
    es.value=ADMIN_FILTER_EXPERT;
    cs.value=ADMIN_FILTER_CLIENT;
    ts.value=ADMIN_FILTER_TYPE;
  }
}

function stepNext(id,ev){
  ev.stopPropagation();
  var d=DEMARCHES.find(function(x){return x.id===id});
  if(d.payment_mode && d.payment_mode !== 'comptant' && d.installments_paid < d.step){
    toast('🚫 Bloqué : payez la tranche '+d.step+' avant de continuer');
    return;
  }
  if(d.step<STEPS[d.type].length){d.step++;toast('→ '+STEPS[d.type][d.step-1])}
  if(d.step===STEPS[d.type].length)d.status='termine';
  render();
}

function stepSet(id,n,ev){
  ev.stopPropagation();
  var d=DEMARCHES.find(function(x){return x.id===id});
  if(CURRENT_VIEW==='user'){
    if(n < d.step){
      toast('🚫 Le client ne peut pas revenir à une étape précédente');
      return;
    }
    // Étapes futures non cliquables côté user
    if(n > d.step){
      toast('🚫 Cette étape n\'est pas encore accessible');
      return;
    }
  }
  d.step=n;toast(STEPS[d.type][n-1]);
  if(n===STEPS[d.type].length)d.status='termine';
  render();
}

function actTxt(m,ev){if(ev)ev.stopPropagation();toast(m)}

var EXPERTS_LFO = [
  {id:'yohann',name:'Yohann',role:'Founder LFO',spe:'Stratégie OF, EDOF, Qualiopi',color:'#D85A30',init:'Y'},
  {id:'laurent',name:'Laurent',role:'Expert formation',spe:'Création OF, NDA, OPCO, France Travail',color:'#7F77DD',init:'L'},
  {id:'karim',name:'Karim',role:'Expert tech',spe:'Site, App, LMS, Agent IA',color:'#378ADD',init:'K'},
  {id:'marie',name:'Marie',role:'Expert certifications',spe:'Centre certifié, RNCP, RS, France Compétences',color:'#1D9E75',init:'M'}
];

function openRdvModal(ev){
  if(ev)ev.stopPropagation();
  var m=document.getElementById('rdv-modal');
  if(!m){
    m=document.createElement('div');
    m.id='rdv-modal';
    m.className='modal-overlay';
    m.onclick=function(e){if(e.target===m)closeRdvModal()};
    var h='<div class="modal-card"><div class="modal-head"><div><h2>Prendre rendez-vous</h2><p>Choisissez l\'expert qui vous accompagnera</p></div><button class="modal-close" onclick="closeRdvModal()">×</button></div><div class="rdv-grid">';
    EXPERTS_LFO.forEach(function(e){
      h+='<div class="rdv-card" onclick="bookRdv(\''+e.id+'\')">';
      h+='<div class="rdv-avatar" style="background:'+e.color+'">'+e.init+'</div>';
      h+='<div class="rdv-info"><b>'+e.name+'</b><span>'+e.role+'</span><div class="rdv-spe">🎯 '+e.spe+'</div></div>';
      h+='<button class="rdv-btn" style="background:'+e.color+'">Réserver →</button>';
      h+='</div>';
    });
    h+='</div></div>';
    m.innerHTML=h;
    document.body.appendChild(m);
  }
  m.style.display='flex';
}

function closeRdvModal(){
  var m=document.getElementById('rdv-modal');
  if(m)m.style.display='none';
}

function bookRdv(id){
  var e=EXPERTS_LFO.find(function(x){return x.id===id});
  closeRdvModal();
  toast('📅 Redirection Cal.com vers '+e.name+' ('+e.role+')');
}

function toggleOption(id,key,ev){
  ev.stopPropagation();
  var d=DEMARCHES.find(function(x){return x.id===id});
  var idx=d.options.indexOf(key);
  if(idx>=0)d.options.splice(idx,1);else d.options.push(key);
  render();
  setTimeout(function(){var c=document.getElementById('c-'+id);if(c)c.classList.add('op')},20);
}

function calcPrice(d){
  var base=PRICES[d.type];
  var opts=OPTIONS[d.type]||[];
  var extra=0;
  (d.options||[]).forEach(function(k){
    var opt=opts.find(function(o){return o.k===k});
    if(opt)extra+=opt.p;
  });
  return base + extra;
}

function setPaymentMode(id,mode,ev){
  if(ev)ev.stopPropagation();
  var d=DEMARCHES.find(function(x){return x.id===id});
  d.payment_mode=mode;
  d.installments_total=mode==='2x'?2:mode==='3x'?3:1;
  render();
  setTimeout(function(){var c=document.getElementById('c-'+id);if(c)c.classList.add('op')},20);
  toast('Mode paiement : '+mode);
}

function openDetails(id,ev){
  ev.stopPropagation();
  var c=document.getElementById('c-'+id);
  if(!c)return;
  c.classList.add('op');
  c.scrollIntoView({behavior:'smooth', block:'start'});
  toast('📂 Détails ouverts');
}

function render(){
  if(MODE==='catalogue'){renderCatalogue();return}
  // Mémoriser quelles cards sont ouvertes avant re-render
  var openIds = [];
  document.querySelectorAll('.cc.op').forEach(function(c){
    if(c.id && c.id.indexOf('c-')===0) openIds.push(c.id);
  });
  var list=visibleDemarches();
  if(list.length===0){
    document.getElementById('cards').innerHTML='<div class="empty">Aucune démarche ne correspond aux filtres</div>';
    renderFilters();
    return;
  }
  var groups={};
  list.forEach(function(d){var c=getCategoryOf(d.type);if(!groups[c])groups[c]=[];groups[c].push(d)});
  var ordered=Object.keys(CATEGORIES).filter(function(c){return groups[c]});
  var h='';
  ordered.forEach(function(c){
    h+='<div class="cl">'+c+' ('+groups[c].length+')</div>';
    groups[c].forEach(function(d){h+=renderCard(d)});
  });
  document.getElementById('cards').innerHTML=h;
  // Restaurer l'état ouvert
  openIds.forEach(function(id){
    var el=document.getElementById(id);
    if(el)el.classList.add('op');
  });
  renderFilters();
}

function renderCard(d){
  var steps=STEPS[d.type],total=steps.length;
  var col=COLORS[d.type];
  var currentLabel=steps[d.step-1];
  var pct=Math.round((d.step-1)/(total-1)*100);
  if(d.status==='termine')pct=100;

  var h='';
  h+='<div class="cc" id="c-'+d.id+'" onclick="tog(\''+d.id+'\')"><div class="ci">';
  h+='<div class="cb2" style="background:'+col.bar+'"></div>';
  h+='<span class="ct" style="background:'+col.bg+';color:'+col.tx+'">'+NAMES[d.type]+'</span>';
  h+='<div class="cn">';
  if(CURRENT_VIEW==='user'){
    h+='<div class="cnn">'+NAMES[d.type]+' '+statusBadge(d)+'</div>';
    h+='<div class="cm">'+d.created+(d.expert?' · Expert '+d.expert:'')+'</div>';
  }else{
    h+='<div class="cnn">'+d.user+' '+statusBadge(d)+'</div>';
    h+='<div class="cm">'+d.email+(d.expert?' · '+d.expert:'')+' · '+d.created+'</div>';
  }
  h+='</div>';
  if(CURRENT_VIEW==='user'){
    h+='<div class="prg"><div class="prg-t"><span>Étape '+d.step+'/'+total+'</span><b>'+pct+'%</b></div><div class="prg-bar"><div class="prg-fill" style="width:'+pct+'%"></div></div></div>';
  }else{
    var bg=(d.status==='termine')?'#E9F7F1':(d.status==='en_attente_paiement'?'#FFF9E6':'#EDF3F9');
    var fg=(d.status==='termine')?'#1D9E75':(d.status==='en_attente_paiement'?'#BA7517':'#2B5F8A');
    var tc=(d.status==='termine')?'#0F6E56':(d.status==='en_attente_paiement'?'#854F0B':'#234E70');
    h+='<div class="sb" style="background:'+bg+'"><div class="sn" style="background:'+fg+'">'+d.step+'</div><div class="sl" style="color:'+tc+'">'+currentLabel+'</div></div>';
  }
  h+='<button class="details-btn" onclick="openDetails(\''+d.id+'\',event)">Détails</button>';
  h+='<div class="ca"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></div>';
  h+='</div></div>';

  h+='<div class="ce">';
  h+='<div class="cs">';
  steps.forEach(function(nm,i){
    var sn=i+1;
    var cls=sn<d.step?'d':(sn===d.step?'c':'p');
    var dot=sn<d.step?CHK:sn;
    var isLocked = (CURRENT_VIEW==='user' && sn>d.step);
    var lockStyle = isLocked ? ' style="cursor:not-allowed;opacity:.45" title="Étape verrouillée"' : '';
    var lockIcon = isLocked ? ' 🔒' : '';
    h+='<div class="'+cls+'"'+lockStyle+' onclick="stepSet(\''+d.id+'\','+sn+',event)"><div class="sd">'+dot+'</div><span class="sn3">'+nm+lockIcon+'</span></div>';
  });
  h+='</div>';

  h+='<div class="eb">';
  h+='<div class="eh"><span class="ecb">Étape en cours</span><span class="ect'+(d.status==='termine'?' dt':'')+'">'+currentLabel+'</span>'+paymentBadge(d)+'</div>';

  if(d.step===1){
    h+=renderConfigStep(d);
  }else{
    h+='<div class="cfg"><div class="cfg-t">Documents de l\'étape '+d.step+' : '+currentLabel+'</div><div class="cfg-h">Les documents nécessaires à cette étape s\'affichent ici. Voir le catalogue complet pour la liste détaillée des docs requis par étape.</div></div>';
  }

  h+='<div class="ep"><div class="ept">Résumé</div>';
  h+='<div class="epr"><span class="epk">Type</span><span class="epv">'+NAMES[d.type]+'</span></div>';
  if(CURRENT_VIEW==='admin'){
    h+='<div class="epr"><span class="epk">Client</span><span class="epv">'+d.user+'</span></div>';
    h+='<div class="epr"><span class="epk">Expert</span><span class="epv">'+(d.expert||'Non assigné')+'</span></div>';
  }
  if(CURRENT_VIEW!=='expert'){
    var total_price=calcPrice(d);
    h+='<div class="epr"><span class="epk">Prix total</span><span class="epv">'+total_price.toLocaleString('fr-FR')+' €</span></div>';
    h+='<div class="epr"><span class="epk">Mode paiement</span><span class="epv">'+(d.payment_mode||'Non défini')+'</span></div>';
    if(d.payment_mode && d.payment_mode!=='comptant'){
      h+='<div class="epr"><span class="epk">Tranches</span><span class="epv">'+d.installments_paid+'/'+d.installments_total+'</span></div>';
    }
  }
  h+='<div class="epr"><span class="epk">Étape</span><span class="epv">'+d.step+'/'+total+'</span></div>';
  h+='</div></div>';

  h+='<div class="ea">';
  if(CURRENT_VIEW==='admin'){
    h+='<button class="eb4 pr2" onclick="stepNext(\''+d.id+'\',event)">Étape suivante</button>';
    h+='<button class="eb4 sc3" onclick="actTxt(\'Mise en attente\',event)">En attente</button>';
    h+='<button class="eb4 sc3" onclick="actTxt(\'Modal d\\\'assignation expert\',event)">Assigner expert</button>';
    h+='<button class="eb4 sc3" onclick="actTxt(\'Voir messages\',event)">💬 Messages</button>';
    h+='<button class="eb4 dan" onclick="actTxt(\'Démarche annulée (action admin)\',event)">Annuler</button>';
    h+='<button class="eb4 dan" onclick="actTxt(\'Confirmation suppression\',event)">Supprimer</button>';
  }else if(CURRENT_VIEW==='expert'){
    h+='<button class="eb4 pr2" onclick="stepNext(\''+d.id+'\',event)">Valider et passer</button>';
    h+='<button class="eb4 sc3" onclick="actTxt(\'Note interne\',event)">📝 Note interne</button>';
    h+='<button class="eb4 sc3" onclick="actTxt(\'Message au client\',event)">💬 Message client</button>';
    h+='<button class="eb4 sc3" onclick="actTxt(\'Signaler à l\\\'admin\',event)">⚠ Signaler</button>';
  }else{
    if(!d.paid || d.installments_paid < d.installments_total){
      var toPay = d.installments_paid < d.installments_total ? Math.round(calcPrice(d)/d.installments_total) : calcPrice(d);
      h+='<button class="eb4 pr2" onclick="actTxt(\'Stripe Checkout : '+toPay+' €\',event)">Payer '+toPay+' €</button>';
    }
    h+='<button class="eb4 sc3" onclick="actTxt(\'💬 Messagerie ouverte\',event)">💬 Messagerie</button>';
    h+='<button class="eb4 sc3" onclick="actTxt(\'📄 Documents\',event)">📄 Documents</button>';
    h+='<button class="eb4 sc3" onclick="openRdvModal(event)">📅 Prendre RDV expert</button>';
    if(d.status!=='termine'){
      if(d.step <= 2){
        h+='<button class="eb4 dan" onclick="actTxt(\'Annulation demandée\',event)">Annuler</button>';
      }else{
        h+='<button class="eb4 sc3" onclick="actTxt(\'Annulation impossible après l\\\'étape 2 — contactez l\\\'admin via la messagerie\',event)" title="Annulation possible uniquement par l\'admin après l\'étape 2" style="opacity:.6;cursor:help">🔒 Annulation admin</button>';
      }
    }
  }
  h+='</div>';

  h+='</div>';
  return h;
}

function renderConfigStep(d){
  var h='<div class="cfg">';
  h+='<div class="cfg-t">Configuration</div>';

  if(CROSSSELL[d.type]){
    var blockers=CROSSSELL[d.type].filter(function(c){return !ORGANISME[c.miss]});
    if(blockers.length>0){
      h+='<div class="crosssell-block"><p>⚠ <b>Prérequis manquant</b> : '+blockers[0].msg+'</p>';
      h+='<button class="crosssell-btn" onclick="event.stopPropagation();toast(\'Redirection vers '+blockers[0].to+'\')">→ Commencer la démarche '+NAMES[blockers[0].to]+'</button></div>';
    }
  }

  if(HAS_CHATBOT_IA.indexOf(d.type)>=0){
    h+='<div class="cfg-h">💬 Cette démarche utilise un chatbot IA à l\'étape 2 pour générer automatiquement votre dossier.</div>';
  }

  h+='<div class="cfg-h">Organisme : <b>'+ORGANISME.raison_sociale+'</b> (SIREN '+ORGANISME.siren+')</div>';

  var options=OPTIONS[d.type]||[];
  var base=PRICES[d.type];
  var total=calcPrice(d);
  var modes=PAYMENT_MODES[d.type]||[];

  if(options.length > 0){
    h+='<div class="cfg-t" style="margin-top:14px;margin-bottom:6px">Options</div>';
    h+='<div class="opt-list">';
    options.forEach(function(opt){
      var sel=d.options.indexOf(opt.k)>=0;
      h+='<div class="opt-item'+(sel?' sel':'')+'" onclick="toggleOption(\''+d.id+'\',\''+opt.k+'\',event)">';
      h+='<div class="opt-chk">'+(sel?CHK:'')+'</div>';
      h+='<div class="opt-info"><b>'+opt.n+'</b>'+(opt.d?'<span>'+opt.d+'</span>':'')+'</div>';
      h+='<div class="opt-price">+'+opt.p+' €</div>';
      h+='</div>';
    });
    h+='</div>';
  }

  h+='<div class="pricing-box" style="margin-top:14px">';
  h+='<div class="pricing-row"><span>Prix de base</span><span>'+base.toLocaleString('fr-FR')+' €</span></div>';
  if(d.options.length>0){
    d.options.forEach(function(k){
      var opt=options.find(function(o){return o.k===k});
      if(opt)h+='<div class="pricing-row"><span>+ '+opt.n+'</span><span>+'+opt.p+' €</span></div>';
    });
  }
  h+='<div class="pricing-total"><span>Total</span><span>'+total.toLocaleString('fr-FR')+' €</span></div>';
  h+='<div class="pricing-installments">';
  modes.forEach(function(m){
    var label=m==='comptant'?'Comptant '+total+' €':m==='2x'?'2× '+Math.round(total/2)+' €':'3× '+Math.round(total/3)+' €';
    var sel=(d.payment_mode===m);
    h+='<div class="install-pill'+(sel?' sel':'')+'" onclick="setPaymentMode(\''+d.id+'\',\''+m+'\',event)">'+label+'</div>';
  });
  h+='</div></div>';

  h+='</div>';
  return h;
}

// =============== CATALOGUE MODE ===============

function onAddBtn(){
  if(CURRENT_VIEW==='admin'){
    toast('🛠 Modal admin : créer démarche pour un client (paiement hors-site)');
    return;
  }
  enterCatalogue();
}

function enterCatalogue(){
  MODE='catalogue';
  CATALOGUE_FILTER='all';
  document.getElementById('catalogue-mode').style.display='block';
  document.getElementById('list-mode').style.display='none';
  renderCatalogue();
  window.scrollTo({top:0,behavior:'smooth'});
}

function exitCatalogue(){
  MODE='list';
  document.getElementById('catalogue-mode').style.display='none';
  document.getElementById('list-mode').style.display='block';
  render();
}

function setCatFilter(cat){
  CATALOGUE_FILTER=cat;
  renderCatalogue();
}

function renderCatalogue(){
  // Filter bar
  var counts={all:TYPES_ALL.length};
  Object.keys(CATEGORIES).forEach(function(c){counts[c]=CATEGORIES[c].length});
  var fb='<button class="fb-btn'+(CATALOGUE_FILTER==='all'?' act':'')+'" onclick="setCatFilter(\'all\')">Toutes ('+counts.all+')</button>';
  Object.keys(CATEGORIES).forEach(function(c){
    fb+='<button class="fb-btn'+(CATALOGUE_FILTER===c?' act':'')+'" onclick="setCatFilter(\''+c+'\')">'+c+' ('+counts[c]+')</button>';
  });
  document.getElementById('cat-filter-bar').innerHTML=fb;

  // Catalogue
  var typesToShow=TYPES_ALL;
  if(CATALOGUE_FILTER!=='all')typesToShow=CATEGORIES[CATALOGUE_FILTER]||[];

  var groups={};
  typesToShow.forEach(function(t){
    var c=getCategoryOf(t);
    if(!groups[c])groups[c]=[];
    groups[c].push(t);
  });

  var h='';
  Object.keys(CATEGORIES).forEach(function(c){
    if(!groups[c])return;
    h+='<div class="cl">'+c+' ('+groups[c].length+')</div>';
    h+='<div class="catalogue-grid">';
    groups[c].forEach(function(type){
      var col=COLORS[type];
      var price=PRICES[type];
      var modes=PAYMENT_MODES[type]||[];
      var modeLabel=modes.length===1?modes[0]:modes.join(' / ');
      h+='<div class="cat-card" onclick="startDemarche(\''+type+'\')">';
      h+='<div class="cat-card-bar" style="background:'+col.bar+'"></div>';
      h+='<div class="cat-card-head"><span class="cat-tag" style="background:'+col.bg+';color:'+col.tx+'">'+NAMES[type]+'</span></div>';
      h+='<div class="cat-card-title">'+NAMES[type]+'</div>';
      h+='<div class="cat-card-desc">'+(DESCS[type]||'')+'</div>';
      h+='<div class="cat-card-meta">';
      h+='<div><div class="cat-price" style="color:'+col.bar+'">'+price.toLocaleString('fr-FR')+' €</div><div class="cat-pay">'+modeLabel+'</div></div>';
      h+='<button class="cat-start-btn" style="background:'+col.bar+'" onclick="event.stopPropagation();startDemarche(\''+type+'\')">';
      h+='Démarrer →</button>';
      h+='</div>';
      h+='</div>';
    });
    h+='</div>';
  });

  document.getElementById('catalogue-grid').innerHTML=h;
}

function startDemarche(type){
  // Créer une nouvelle démarche pour le user actuel
  var newId='d-pam-new-'+Date.now();
  DEMARCHES.unshift({
    id:newId,
    type:type,
    user:CURRENT_USER.name,
    email:CURRENT_USER.email,
    siren:'881279392',
    step:1,
    status:'nouveau',
    paid:false,
    payment_mode:null,
    installments_paid:0,
    installments_total:1,
    expert:null,
    created:'17/04/2026',
    options:[],
    parent_id:null
  });

  exitCatalogue();
  toast('✓ Démarche '+NAMES[type]+' créée — Configuration en cours');

  // Auto-ouvrir la nouvelle card
  setTimeout(function(){
    var c=document.getElementById('c-'+newId);
    if(c){
      c.classList.add('op');
      c.scrollIntoView({behavior:'smooth',block:'start'});
    }
  },150);
}

setView('user');
